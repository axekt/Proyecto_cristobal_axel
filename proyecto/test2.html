<!DOCTYPE html>
<html lang="es">
<head>
    <title>sistema de gestion</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        .menu-lateral{
            width: 200px;
            height: 100vh;
            background-color: #000000;
            padding: 20px;
            position:fixed;
            top: 0;
            left: -200px;
            transition: left 0.3s ease;
            border-right: 1px solid #333;
            z-index: 1000;
        }
        
        .menu-lateral.abierto{
            left: 0;
        }

        .menu-lateral h2{
            margin-bottom: 30px;
            color: #f7f5f5;
            text-align: center;
        }

        .menu-lateral ul{
            list-style: none;
        }

        .menu-lateral li{
            margin-bottom: 15px;
        }
        
        .menu-lateral a{
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: block;
            padding: 10px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .menu-lateral a:hover{
            background-color: #333;
            color: #4caf50;
        }

        .contenido-principal{
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            transition: margin-left 0.3s ease;
        }

        .tarjeta{
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #333;
        }

        .boton-salir{
            margin-top: 50px;
            background-color: #cc0000;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 250px;
            cursor: pointer;
        }

        .boton-menu {
            background-color: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .boton-menu:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <nav id="miMenu" class="menu-lateral">
        <h2>panel de gestion</h2>
        <ul>
            <li><a href="#">inicio</a></li>
             <li><a href="#">buscar</a></li>
            <li><a href="#">usuarios</a></li>
            <li><a href="#">configuracion</a></li>
            <li><a href="#">reportes</a></li>
        </ul>

        <form action="index.html">
        
        <button type="submit" class="boton-salir">cerrar sesion</button>
    </nav>
</form>
    <main id="contenido" class="contenido-principal">
        
        <button id="btnAbrirMenu" class="boton-menu">☰</button>

        <h1>bienvenido al sistema</h1>
        <p style="margin-top: 10px; color: #aaaaaa;">este es un sistema de gestion de usuarios</p>

        <div class="tarjeta">
            <h3>informacion del sistema</h3>
            <p style="margin-top: 10px;">esta es la informacion general del sistema de gestion.</p>
        </div>
    </main>

    <script>
        const menu = document.getElementById("miMenu");
        const btnAbrirMenu = document.getElementById("btnAbrirMenu");
        const contenido = document.getElementById("contenido");

        btnAbrirMenu.addEventListener("click", function() {
            menu.classList.toggle("abierto");

            if (menu.classList.contains("abierto")) {
                btnAbrirMenu.innerHTML = "✖";
                contenido.style.marginLeft = "250px"; 
            } else {
                btnAbrirMenu.innerHTML = "☰";
                contenido.style.marginLeft = "0"; 
            }
        });
    </script>
</body>
</html>
