<!DOCTYPE html>
<html lang="en">
<head>
    <title>ingrese su nombre</title>
    <style>
        body{
            background:radial-gradient(circle, rgb(192, 94, 192), pink, black );
            color: white;
            font-family: Arial, sans-serif;
        }
        form{
            margin: 50px;
        }
        label{
            display: block;
            margin-bottom: 15px;
        }
        input{
            margin-top: 5px;
            padding: 5px;
        }
        .button-ingresar{
            margin-top: 20px;
            padding: 8px 15px;
            cursor: pointer;
            display: block;
        }
        .button-ver{
            padding: 5px 10px;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <h1>Bienvendido a test 1 </h1>
    <h1>Acceso al sistema</h1>
    
    <!-- El action ahora apunta a la ruta de tu servidor y usa el método POST -->
    <form action="/login" method="POST">
        <label for="nombre">Nombre de usuario:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre de usuario" required>
        
        <!-- Se cambió 'contrase a' por 'password' para evitar errores de codificación -->
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
        
        <!-- El botón ahora es tipo 'submit' para enviar los datos al backend -->
        <button type="submit" id="btnIngresar" class="button-ingresar">Ingresar</button>
    </form>
    
    <!-- El bloque <script> que redirigía usando window.location.href fue eliminado -->
</body>
</html>
