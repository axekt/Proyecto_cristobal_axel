<!DOCTYPE html> 
<html lang="es"> 
<head>     
    <title>ingrese su nombre</title>     
    <style>         
        body {             
            background: radial-gradient(circle, rgb(192, 94, 192), pink, black);             
            color: white;             
            font-family: Arial, sans-serif;             
            margin: 0;             
            display: flex;             
            flex-direction: column;             
            align-items: center;             
            justify-content: center;             
            height: 100vh;         
        }         
        form {             
            margin: 40px;                       
        }         
        label {             
            display: block;             
            margin-bottom: 20px; 
            position: fixed;
        }         
        input {             
            margin-top: 5px;             
            padding: 5px;         
        }         
        .button-ingresar {             
            margin-top: 20px;             
            padding: 8px 15px;             
            cursor: pointer;             
            display: block;         
        }         
        .area-registro {             
            margin-top: 25px;             
            font-size: 14px;         
        }         
        .enlace-registro {             
            color: white;             
            text-decoration: underline;             
            font-weight: bold;         
        }         
        .enlace-registro:hover {             
            color: #e50914;         
        }         
        .contenedor-mostrar {             
            margin-top: 10px;             
            display: flex;             
            align-items: center;         
        }         
        
        .contenedor-mostrar input {             
            margin: 0;             
            margin-right: 8px;             
            cursor: pointer;         
        }         
        .texto-mostrar {             
            margin: 0;             
            font-size: 14px;             
            display: inline;             
            cursor: pointer;         
        }     
    </style> 
</head> 
<body>     
    <h1>Bienvenido a test 1 </h1>     
    <h1>Acceso al sistema</h1>     
    <form id="formularioLogin">         
        <label for="nombre">Nombre de usuario:</label>         
        <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre de usuario" required>         
        
        <label for="clave">Contraseña:</label>                  
        <input type="password" id="clave" name="clave" placeholder="Ingrese su contraseña" required>         
        
        <div class="contenedor-mostrar">             
            <input type="checkbox" id="mostrar">             
            <label for="mostrar" class="texto-mostrar">mostrar contraseña</label>         
        </div>                   
        
        <div class="area-registro">             
            registrate <a href="registrarse.html" class="enlace-registro">aqui</a>         
        </div>         
        
        <button type="submit" id="btnIngresar" class="button-ingresar">ingresar</button>          
    </form>     

    <script>                  
        const formulario = document.getElementById('formularioLogin');        
        
        formulario.addEventListener("submit", function(evento) {         
            evento.preventDefault();          
            
            const valorNombre = document.getElementById('nombre').value;         
            const valorClave = document.getElementById('clave').value; 
            if(valorNombre.trim() !== "" && valorClave.trim() !== "") {                          
                window.location.href = "test2.html";         
            } else {             
                console.log("faltan datos");         
            }                
        });        

        const mostrarCheckbox = document.getElementById('mostrar');         
        const claveInput = document.getElementById('clave'); 
        mostrarCheckbox.addEventListener('change', function(){             
            if(mostrarCheckbox.checked){                 
                claveInput.type = 'text';             
            } else {                 
                claveInput.type = 'password';             
            }         
        });     
    </script> 
</body> 
</html>
